<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surrender – Stray Love PH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">
            <img src="logo.jpg" alt="Stray Love PH Logo">
            <h2>Stray Love PH</h2>
        </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="animals.html">Available Animals</a></li>
            <li><a href="surrender.html" class="active">Surrender</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>

    <div class="page-wrapper">
        <section class="form-section">
            <h2>Surrender Guidelines</h2>
            <p class="section-subtitle">Please ensure the animal is healthy and provide accurate information.</p>

            <form onsubmit="submitForm(event)">
                <input type="text" placeholder="Owner Name" required>
                <input type="text" placeholder="Animal Name" required>
                <textarea placeholder="Reason for surrender" rows="4"></textarea>
                <button type="submit">Submit Surrender</button>
            </form>
        </section>
    </div>

    <footer>
        <p>© 2026 Stray Love PH Shelter</p>
    </footer>

    <script src="script.js"></script>

</body>
